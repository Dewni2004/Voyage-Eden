<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="/hero-image.webp" as="image" type="image/webp" />
    <title>Eden Travels | Premium Travel Experiences</title>

    <!-- Google Analytics (Dynamic by Domain) -->
    <script>
      const gaMapping = {
        'srilankaviajeseden.es': 'G-H9ZRSQJTMS', // Spanish
        'www.srilankaviajeseden.es': 'G-H9ZRSQJTMS',
        'viaggieden.it': 'G-SDT7C4KQJC', // Italian
        'www.viaggieden.it': 'G-SDT7C4KQJC'
      };
      
      const hostname = window.location.hostname;
      const gaId = gaMapping[hostname];
      
      if (gaId) {
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', gaId);
      }
    </script>
    <!-- End Google Analytics -->
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function(l) {
        if (l.search && l.search.slice(1, 3) === 'p=') {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            var basePath = l.pathname;
            if (basePath.slice(-1) === '/') {
              basePath = basePath.slice(0, -1);
            }
            window.history.replaceState(null, null,
              basePath + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
